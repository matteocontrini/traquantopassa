name: Deploy
on:
  push:
    branches: [ main ]
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: 'production'
      url: 'https://traquantopassa.in'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Run Svelte checks
        env:
          PUBLIC_BASE_URL: https://traquantopassa.in
        run: npm run check
      - name: Run tests
        run: npm run test
      - name: Set up Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        run: flyctl deploy --local-only
